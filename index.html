<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malayan Tapir</title>
  <meta name="description" content="AIoT语音算法部署 · 手风琴爱好者 · 织码女巫">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <span class="topbar-avatar" aria-hidden="true">
        <img src="img/avatar.png" alt="">
      </span>
      <a class="topbar-title" href="index.html">Malayan Tapir</a>
    </div>
    <nav class="topbar-nav" aria-label="主导航">
      <a href="#writing" data-i18n="nav.writing">文字</a>
      <a href="#journal" data-i18n="nav.journal">日记</a>
      <a href="#music"   data-i18n="nav.music">音乐</a>
      <a href="#tools"   data-i18n="nav.tools">工具</a>
      <button class="lang-toggle" onclick="I18n.setLang(I18n.getLang()==='zh'?'en':'zh')" aria-label="切换语言">
        <span data-i18n="nav.toggle">EN</span>
      </button>
    </nav>
  </div>
</header>

<!-- Hero -->
<section class="hero" aria-label="简介">
  <h1
    class="hero-title"
    data-scramble="Malayan Tapir"
    aria-label="Malayan Tapir"
  >Malayan Tapir</h1>
  <p class="hero-tagline" data-i18n="header.bio">AIoT语音算法部署 · 手风琴爱好者 · 织码女巫</p>
  <p class="hero-quote" data-i18n="header.tagline">在两个都不属于她的世界之间</p>
  <p class="hero-scroll" aria-hidden="true">↓</p>
</section>

<!-- Content -->
<main class="content-area" style="max-width: var(--max-width-wide);">
  <div class="homepage-grid">

    <!-- Left: main column -->
    <div class="col-main">

      <!-- 文字 / Writing -->
      <section class="section" id="writing">
        <div class="section-header">
          <h2 class="section-title">
            文字 <span class="en-sub">/ Writing</span>
          </h2>
          <hr class="section-rule">
        </div>
        <div class="tag-filter" id="writing-filter" role="group" aria-label="按标签筛选"></div>
        <ul class="post-list" id="writing-list"></ul>
      </section>

      <!-- 日记 / Journal -->
      <section class="section" id="journal">
        <div class="section-header">
          <h2 class="section-title">
            日记 <span class="en-sub">/ Journal</span>
          </h2>
          <hr class="section-rule">
        </div>
        <div class="journal-list" id="journal-list"></div>
      </section>

    </div><!-- /.col-main -->

    <!-- Right: sidebar -->
    <aside class="col-side">

      <!-- 音乐 / Music -->
      <section class="section" id="music">
        <div class="section-header">
          <h2 class="section-title">
            音乐 <span class="en-sub">/ Music</span>
          </h2>
          <hr class="section-rule">
        </div>
        <ul class="score-list" id="music-list"></ul>
      </section>

      <!-- 工具 & 游戏 / Tools & Games -->
      <section class="section" id="tools">
        <div class="section-header">
          <h2 class="section-title">
            工具 <span class="en-sub">/ Tools</span>
          </h2>
          <hr class="section-rule">
        </div>
        <div class="game-grid" id="games-grid"></div>
      </section>

    </aside><!-- /.col-side -->

  </div><!-- /.homepage-grid -->
</main>

<!-- Footer -->
<footer class="site-footer">
  <span data-i18n="footer.copy">© 2025 Malayan Tapir</span>
  &ensp;·&ensp;
  <a href="https://github.com/ZehuiTIAN" target="_blank" rel="noopener" data-i18n="footer.github">GitHub</a>
</footer>

<!-- Scripts -->
<script src="js/content-index.js"></script>
<script src="js/i18n.js"></script>
<script src="js/markdown.js"></script>
<script src="js/home.js"></script>
<script src="js/scramble.js"></script>
<script src="js/ascii-rain.js"></script>
<script src="js/ascii-fx.js"></script>

</body>
</html>
